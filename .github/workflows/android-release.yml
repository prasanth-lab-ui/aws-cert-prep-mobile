name: Android Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_to_drive:
        description: 'Upload APK to Google Drive after build'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    outputs:
      apk_name: ${{ steps.locate.outputs.apk_name }}
      apk_path: ${{ steps.locate.outputs.apk_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Write .env from secrets
        run: |
          {
            echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'http://65.0.73.208:5000/api' }}"
            echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
          } > .env
          cat .env | sed 's/=.*/=***/'

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.3

      - name: Generate launcher icons + debug.keystore
        run: |
          set -eux
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends imagemagick > /dev/null
          # Solid color launcher icon. Replace with real branding later.
          for d in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            density="${d%%:*}"
            size="${d##*:}"
            mkdir -p "android/app/src/main/res/mipmap-${density}"
            convert -size "${size}x${size}" xc:"#FF9900" \
              -gravity center -pointsize $((size/3)) -fill white -font DejaVu-Sans-Bold -annotate +0+0 "A" \
              "android/app/src/main/res/mipmap-${density}/ic_launcher.png"
            cp "android/app/src/main/res/mipmap-${density}/ic_launcher.png" \
               "android/app/src/main/res/mipmap-${density}/ic_launcher_round.png"
          done
          # Debug keystore (only if not present).
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${RELEASE_KEYSTORE_BASE64}" ]; then
            echo "::warning::RELEASE_KEYSTORE_BASE64 secret is not set; generating an ephemeral keystore. APKs from this build will NOT be reusable for Play Store upgrades."
            keytool -genkeypair -v -keystore android/app/release.keystore \
              -storepass ephemeral -alias aws-cert-prep -keypass ephemeral \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=AWS Cert Prep,O=Ephemeral,C=US"
            echo "EPHEMERAL_KEYSTORE=true" >> $GITHUB_ENV
          else
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          fi

      - name: Write signing config to gradle.properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          STORE_PASSWORD="${STORE_PASSWORD:-${EPHEMERAL_KEYSTORE:+ephemeral}}"
          KEY_ALIAS="${KEY_ALIAS:-aws-cert-prep}"
          KEY_PASSWORD="${KEY_PASSWORD:-${EPHEMERAL_KEYSTORE:+ephemeral}}"
          {
            echo "MYAPP_RELEASE_STORE_FILE=release.keystore"
            echo "MYAPP_RELEASE_STORE_PASSWORD=${STORE_PASSWORD}"
            echo "MYAPP_RELEASE_KEY_ALIAS=${KEY_ALIAS}"
            echo "MYAPP_RELEASE_KEY_PASSWORD=${KEY_PASSWORD}"
          } >> android/gradle.properties

      - name: Build release APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)
          VERSION_TAG="${GITHUB_REF_NAME//\//-}"
          APK_NAME="aws-cert-prep-${VERSION_TAG}-$(date -u +%Y%m%d-%H%M%S).apk"
          mkdir -p artifacts && cp "$APK_PATH" "artifacts/$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_path=artifacts/$APK_NAME" >> $GITHUB_OUTPUT
          ls -lh artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.locate.outputs.apk_name }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.apk_path }}
          generate_release_notes: true

  upload_drive:
    name: Upload APK to Google Drive
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.upload_to_drive == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.apk_name }}
          path: artifacts

      - name: Install googleapis
        run: npm init -y > /dev/null && npm install googleapis@140

      - name: Upload to Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          APK_NAME: ${{ needs.build.outputs.apk_name }}
        run: |
          if [ -z "$GDRIVE_SERVICE_ACCOUNT_JSON" ] || [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "::warning::Drive secrets missing. Skipping upload."
            exit 0
          fi
          APK_PATH=$(find artifacts -name '*.apk' | head -n 1)
          node scripts/upload-to-drive.js "$APK_PATH" "$APK_NAME" "$GDRIVE_FOLDER_ID"
