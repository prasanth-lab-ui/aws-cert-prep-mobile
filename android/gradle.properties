# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.configureondemand=true

android.useAndroidX=true
android.enableJetifier=true

# Hermes (default JS engine)
hermesEnabled=true

# New architecture / fabric (disabled by default for stability with 0.73)
newArchEnabled=false

# Release signing config — values are injected by CI from secrets or supplied locally via
# android/keystore.properties (never commit that file).
MYAPP_RELEASE_STORE_FILE=release.keystore
MYAPP_RELEASE_KEY_ALIAS=aws-cert-prep
MYAPP_RELEASE_STORE_PASSWORD=
MYAPP_RELEASE_KEY_PASSWORD=
